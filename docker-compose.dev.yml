# docker-compose.dev.yml — Development overrides (no GPU required)
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Uses real PaddleOCR-VL on CPU (slow but real) + mock APIM for gate checks.
# For mock OCR instead, change the ocr service to use ./mock-ocr.

services:
  scan-app:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend/app:/app/app  # Hot reload
    environment:
      - LOG_LEVEL=DEBUG
      - APIM_BASE_URL=http://mock-apim:8081  # Use mock APIM in dev
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "5000", "--reload"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src              # Hot reload for components
      - ./frontend/index.html:/app/index.html  # Root HTML
      - ./frontend/vite.config.js:/app/vite.config.js
    environment:
      - API_PROXY_TARGET=http://scan-app:5000  # Docker internal networking
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]

  ocr:
    build:
      context: ./paddleocr-cpu
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - paddleocr-cache:/root/.paddleocr   # Cache model weights across restarts
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s  # Model pre-loads at startup (~90s)
    restart: unless-stopped

  mock-apim:
    build:
      context: ./mock-apim
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  paddleocr-cache:
